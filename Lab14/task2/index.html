<!DOCTYPE html>
<html>
<head>
    <title>Islands Demo</title>
    <style>
        body{font-family:sans-serif;max-width:800px;margin:auto;padding:2rem}
        .island{border:1px solid #ccc;padding:20px;margin:20px 0;border-radius:8px}
        .ocean{color:#666}
        button{padding:5px 10px;margin:5px;cursor:pointer}
        .count{font-size:24px;font-weight:bold;margin:0 10px;display:inline-block;width:40px;text-align:center}
        .color-box{width:80px;height:80px;margin-top:10px;background:gray}
    </style>
</head>
<body>
    <h1>Mechanical Keyboard</h1>
    <p class="ocean">Static text - no JS needed here.</p>

    <div class="island" data-island="counter">
        <h3>Counter Island</h3>
        <button class="dec">-</button>
        <span class="count">0</span>
        <button class="inc">+</button>
    </div>

    <p class="ocean">More static content between islands.</p>

    <div class="island" data-island="color">
        <h3>Color Picker Island</h3>
        <button class="red">Red</button>
        <button class="blue">Blue</button>
        <button class="green">Green</button>
        <div class="color-box"></div>
    </div>

    <script src="islands-engine.js"></script>
</body>
</html>
