<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - MVVM with Two-Way Data Binding</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .mvvm-form {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 550px;
            padding: 35px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 25px;
            font-size: 28px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #1e3c72;
            box-shadow: 0 0 0 3px rgba(30, 60, 114, 0.1);
        }
        
        .error {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
            display: block;
        }
        
        .preview {
            background: #f7f7f7;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        
        .preview h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .preview p {
            margin: 8px 0;
            color: #555;
        }
        
        .preview strong {
            color: #333;
        }
        
        .actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        button:first-child {
            background: #1e3c72;
            color: white;
        }
        
        button:first-child:hover:not(:disabled) {
            background: #2a5298;
            transform: translateY(-2px);
        }
        
        button:first-child:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        button:last-child {
            background: #6c757d;
            color: white;
        }
        
        button:last-child:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }
        
        #message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
        }
        
        .error-message {
            background: #f8d7da;
            color: #721c24;
        }
        
        .valid-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .valid-badge.valid {
            background: #28a745;
            color: white;
        }
        
        .valid-badge.invalid {
            background: #dc3545;
            color: white;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module">
        import { UserProfileViewModel } from './mvvm/viewmodel/UserProfileViewModel.js';
        import { UserProfileForm } from './mvvm/view/UserProfileForm.js';
        
        const viewModel = new UserProfileViewModel();
        const form = new UserProfileForm('app', viewModel);
        form.render();
    </script>
</body>
</html>
